name: default

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  MACOS_MIN_TARGET: "12.0"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  OPUS_CHECKSUM: "6ffcb593207be92584df15b32466ed64bbec99109f007c82205f0194572411a1"
  OPUS_VERSION: "1.6.1"

jobs:
  build-linux-native:
    name: build ${{ matrix.rid }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: linux-x64
            runs_on: ubuntu-24.04
            cflags: "-O2 -march=x86-64 -pipe"
            extra_configure: ""

          - rid: linux-arm64
            runs_on: ubuntu-24.04-arm
            cflags: "-O2 -march=armv8-a -pipe"
            extra_configure: 'ARM_DOTPROD_INTR_CFLAGS="-march=armv8.2-a+dotprod"'

    steps:
      - name: setup tools
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends autoconf automake gcc libtool make

      - name: download source
        run: |
          curl -fSL "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -o opus.tar.gz
          echo "${{ env.OPUS_CHECKSUM }}  opus.tar.gz" | shasum -a 256 --check
          tar -xzf opus.tar.gz
          mv opus-${{ env.OPUS_VERSION }} opus-src

      - name: configure
        working-directory: opus-src
        run: |
          ./configure \
            --enable-shared \
            --enable-static \
            --disable-doc \
            --disable-extra-programs \
            --enable-rtcd \
            CFLAGS="${{ matrix.cflags }}" \
            ${{ matrix.extra_configure }}

      - name: assert intrinsics defined
        working-directory: opus-src
        run: |
          echo "=== Intrinsics in config.h ==="

          grep -E "(MAY_HAVE|PRESUME)_(AVX2|SSE4_1|SSE2|NEON|DOTPROD)" config.h | grep "#define" | grep -v "^//"

          # Fail if no intrinsic defines were set at all
          grep -qE "#define OPUS_(X86|ARM).*(MAY_HAVE|PRESUME)" config.h

      - name: make
        working-directory: opus-src
        run: make -j$(nproc)

      - name: verify AVX2 code generation (x64 only)
        if: matrix.rid == 'linux-x64'
        working-directory: opus-src
        run: |
          echo "=== YMM register usage (AVX2 evidence) ==="
          COUNT=$(objdump -d .libs/libopus.so.0 | grep -c "ymm" || true)

          echo "YMM instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No AVX2 instructions in .so"; exit 1; }

          echo "=== Verifying static archive also contains AVX2 ==="
          COUNT_A=$(objdump -d .libs/libopus.a | grep -c "ymm" || true)

          echo "YMM instructions in .a: $COUNT_A"
          [ "$COUNT_A" -gt 0 ] || { echo "ERROR: No AVX2 instructions in .a"; exit 1; }
          objdump -p .libs/libopus.so.0 | grep SONAME

      - name: verify NEON code generation (arm64 only)
        if: matrix.rid == 'linux-arm64'
        working-directory: opus-src
        run: |
          echo "=== NEON vector register usage ==="
          COUNT=$(aarch64-linux-gnu-objdump -d .libs/libopus.so.0 | grep -cE "\bv[0-9]+\.(16b|8h|4s|2d)\b" || true)

          echo "NEON vector instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No NEON instructions found"; exit 1; }

      - name: test (native only)
        if: matrix.rid == 'linux-x64'
        working-directory: opus-src
        run: make check

      - name: prepare artifact
        run: |
          mkdir -p dist/bin && mkdir -p dist/lib
          ls -la opus-src/.libs/

          cp opus-src/.libs/libopus.a dist/lib
          cp opus-src/.libs/libopus.so dist/bin

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-${{ matrix.rid }}
          path: dist

  build-linux-emulated:
    name: build ${{ matrix.rid }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: linux-arm
            docker_platform: linux/arm/v7
            image: arm32v7/ubuntu:24.04
            cflags: "-O2 -march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -pipe"
            extra_configure: ""

          - rid: linux-musl-x64
            docker_platform: linux/amd64
            image: alpine:3.21
            cflags: "-O2 -march=x86-64 -pipe"
            extra_configure: ""

          - rid: linux-musl-arm64
            docker_platform: linux/arm64
            image: alpine:3.21
            cflags: "-O2 -march=armv8-a -pipe"
            extra_configure: 'ARM_DOTPROD_INTR_CFLAGS="-march=armv8.2-a+dotprod"'

          - rid: linux-musl-arm
            docker_platform: linux/arm/v7
            image: arm32v7/alpine:3.21
            cflags: "-O2 -march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -pipe"
            extra_configure: ""

    steps:
      - name: setup qemu
        uses: docker/setup-qemu-action@v4

      - name: download source
        run: |
          curl -fSL "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -o opus.tar.gz
          echo "${{ env.OPUS_CHECKSUM }}  opus.tar.gz" | sha256sum --check --strict
          tar -xzf opus.tar.gz
          mv opus-${{ env.OPUS_VERSION }} opus-src

      - name: build in container
        run: |
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "${{ github.workspace }}/opus-src:/opus-src" \
            -v "${{ github.workspace }}/dist:/dist" \
            ${{ matrix.image }} \
            sh -c "
              set -e

              # Install build tools — Alpine uses apk, Ubuntu/Debian use apt-get
              if command -v apk > /dev/null 2>&1; then
                apk add --no-cache build-base
              else
                apt-get update -qq
                apt-get install -y --no-install-recommends gcc make libc6-dev
              fi

              cd /opus-src
              ./configure \
                --enable-shared \
                --enable-static \
                --disable-doc \
                --disable-extra-programs \
                --enable-rtcd \
                CFLAGS='${{ matrix.cflags }}' \
                ${{ matrix.extra_configure }}

              make -j\$(nproc)

              mkdir -p /dist/bin /dist/lib
              cp .libs/libopus.so /dist/bin/libopus.so
              cp .libs/libopus.a /dist/lib/libopus.a
            "

      - name: assert intrinsics defined
        run: |
          echo "=== Intrinsics in config.h ==="
          grep -E "(MAY_HAVE|PRESUME)_(AVX2|SSE4_1|SSE2|NEON|DOTPROD)" opus-src/config.h | grep "#define" | grep -v "^//" || true
          grep -qE "#define OPUS_(X86|ARM).*(MAY_HAVE|PRESUME)" opus-src/config.h || echo "WARNING: No intrinsics detected (expected for armv7 without dotprod)"

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-${{ matrix.rid }}
          path: dist

  build-macos:
    name: build ${{ matrix.rid }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: osx-arm64
            runs_on: macos-26
            cflags: "-O2 -pipe"

          - rid: osx-x64
            runs_on: macos-26-intel
            cflags: "-O2 -pipe"

    steps:
      - name: download source
        run: |
          curl -fSL "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -o opus.tar.gz
          echo "${{ env.OPUS_CHECKSUM }}  opus.tar.gz" | shasum -a 256 --check
          tar -xzf opus.tar.gz
          mv opus-${{ env.OPUS_VERSION }} opus-src

      - name: configure
        working-directory: opus-src
        run: |
          ./configure \
            --enable-shared \
            --enable-static \
            --disable-doc \
            --disable-extra-programs \
            --enable-rtcd \
            CFLAGS="${{ matrix.cflags }} -mmacosx-version-min=${{ env.MACOS_MIN_TARGET }}" \
            LDFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_TARGET }}"

      - name: assert intrinsics defined
        working-directory: opus-src
        run: |
          echo "=== Intrinsics in config.h ==="

          grep -E "(MAY_HAVE|PRESUME)_(AVX2|SSE4_1|SSE2|NEON|DOTPROD)" config.h \
            | grep "#define" \
            | grep -v "^//"

          # Fail if no intrinsic defines were set at all
          grep -qE "#define OPUS_(X86|ARM).*(MAY_HAVE|PRESUME)" config.h

      - name: make
        working-directory: opus-src
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: verify AVX2 code generation (x64 only)
        if: matrix.rid == 'osx-x64'
        working-directory: opus-src
        run: |
          echo "=== AVX2 evidence (YMM registers) ==="
          COUNT=$(objdump -d .libs/libopus.dylib | grep -c "ymm" || true)

          echo "YMM instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No AVX2 instructions in dylib"; exit 1; }

      - name: verify NEON code generation (arm64 only)
        if: matrix.rid == 'osx-arm64'
        working-directory: opus-src
        run: |
          echo "=== NEON vector register usage ==="
          COUNT=$(objdump -d .libs/libopus.dylib | grep -cE "\bv[0-9]+\.(16b|8h|4s|2d)\b" || true)

          echo "NEON vector instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No NEON instructions found"; exit 1; }

      - name: prepare artifact
        run: |
          mkdir -p dist/bin && mkdir -p dist/lib
          ls -la opus-src/.libs/

          cp opus-src/.libs/libopus.dylib dist/bin
          cp opus-src/.libs/libopus.a dist/lib

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-${{ matrix.rid }}
          path: dist

  build-windows:
    name: build ${{ matrix.rid }}
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: win-x64
            cmake_arch: x64
            msvc_arch: amd64
            extra_cmake: -DOPUS_X86_MAY_HAVE_AVX2=ON

          - rid: win-arm64
            cmake_arch: ARM64
            msvc_arch: amd64_arm64
            extra_cmake: -DOPUS_ARM_MAY_HAVE_NEON_INTR=ON

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: download source
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -OutFile opus.tar.gz

          $actual = (Get-FileHash opus.tar.gz -Algorithm SHA256).Hash.ToLower()
          $expected = "${{ env.OPUS_CHECKSUM }}"
          if ($actual -ne $expected) {
            Write-Error "SHA256 mismatch. Expected: $expected  Got: $actual"
            exit 1
          }

          tar -xzf opus.tar.gz
          Rename-Item "opus-${{ env.OPUS_VERSION }}" opus-src

      - name: configure (shared)
        working-directory: opus-src
        run: |
          cmake -B build-shared -S . `
            -G "Visual Studio 18 2026" `
            -A ${{ matrix.cmake_arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DOPUS_BUILD_TESTING=OFF `
            -DOPUS_BUILD_PROGRAMS=OFF `
            -DOPUS_INSTALL_PKG_CONFIG_MODULE=OFF `
            ${{ matrix.extra_cmake }}

      - name: build (shared)
        working-directory: opus-src
        run: cmake --build build-shared --config Release --parallel

      - name: configure (static)
        working-directory: opus-src
        run: |
          cmake -B build-static -S . `
            -G "Visual Studio 18 2026" `
            -A ${{ matrix.cmake_arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=OFF `
            -DOPUS_BUILD_TESTING=OFF `
            -DOPUS_BUILD_PROGRAMS=OFF `
            -DOPUS_INSTALL_PKG_CONFIG_MODULE=OFF `
            ${{ matrix.extra_cmake }}

      - name: build (static)
        working-directory: opus-src
        run: cmake --build build-static --config Release --parallel

      - name: verify outputs
        shell: pwsh
        working-directory: opus-src
        run: |
          dumpbin /headers build-shared\Release\opus.dll | findstr "machine"
          dumpbin /exports build-shared\Release\opus.dll | findstr "opus_encode"
          dumpbin /headers build-static\Release\opus.lib | findstr "machine"

      - name: prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\bin
          New-Item -ItemType Directory -Force dist\lib

          Copy-Item opus-src\build-shared\Release\opus.dll dist\bin\opus.dll
          Copy-Item opus-src\build-static\Release\opus.lib dist\lib\opus.lib

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-${{ matrix.rid }}
          path: dist

  pack:
    needs:
      [build-linux-emulated, build-linux-native, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: ./**/packages.lock.json
          global-json-file: global.json

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: libopus-*
          merge-multiple: false
          path: artifact

      - name: restore
        shell: pwsh
        run: |
          dotnet restore --locked-mode

          $artifact = Join-Path ${{ github.workspace }} "artifact"
          $output = Join-Path ${{ github.workspace }} "src"

          foreach ($runtime in @("linux-arm", "linux-arm64", "linux-x64", "linux-musl-arm", "linux-musl-arm64", "linux-musl-x64", "osx-arm64", "osx-x64", "win-arm64", "win-x64")) {
            foreach ($file in Get-ChildItem -Path ([System.IO.Path]::Combine($artifact, "libopus-$runtime", "lib")) -Recurse -File) {
              New-Item -ItemType Directory -Path ([System.IO.Path]::Combine($output, "static", $runtime, "native")) -Force | Out-Null

              $destination = [System.IO.Path]::Combine($output, "static", $runtime, "native", $file.Name)
              Move-Item -Path $file.FullName -Destination $destination -Force

              Write-Host "[!] Moved ${file.FullName} to '$destination'"
            }

            foreach ($file in Get-ChildItem -Path ([System.IO.Path]::Combine($artifact, "libopus-$runtime", "bin")) -Recurse -File) {
              New-Item -ItemType Directory -Path ([System.IO.Path]::Combine($output, "runtimes", $runtime, "native")) -Force | Out-Null

              $destination = [System.IO.Path]::Combine($output, "runtimes", $runtime, "native", $file.Name)
              Move-Item -Path $file.FullName -Destination $destination -Force

              Write-Host "[!] Moved ${file.FullName} to '$destination'"
            }
          }

      - name: pack
        run: dotnet build src/libopus.csproj -c Release && dotnet pack src/libopus.csproj -c Release -o dist --no-build

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-nuget
          path: dist

  publish:
    needs: [pack]
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: nuget login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: libdave

      - name: push
        run: dotnet nuget push "*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
