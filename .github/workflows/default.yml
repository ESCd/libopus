name: default

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  MACOS_MIN_TARGET: "12.0"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  OPUS_CHECKSUM: "6ffcb593207be92584df15b32466ed64bbec99109f007c82205f0194572411a1"
  OPUS_VERSION: "1.6.1"
  RETENTION_DAYS: 14

jobs:
  build-linux:
    name: build ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: linux-x64
            host_triple: x86_64-linux-gnu
            build_triple: x86_64-linux-gnu
            cc: gcc
            cross_pkg: ""
            cflags: "-O2 -march=x86-64 -pipe"
            extra_configure: ""

          - rid: linux-arm64
            host_triple: aarch64-linux-gnu
            build_triple: x86_64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            cross_pkg: "gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross"
            cflags: "-O2 -march=armv8-a -pipe"
            extra_configure: 'ARM_DOTPROD_INTR_CFLAGS="-march=armv8.2-a+dotprod"'

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends autoconf automake gcc libtool make ${{ matrix.cross_pkg }}

      - name: download source
        run: |
          curl -fSL "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -o opus.tar.gz
          echo "${{ env.OPUS_CHECKSUM }}  opus.tar.gz" | shasum -a 256 --check
          tar -xzf opus.tar.gz
          mv opus-${{ env.OPUS_VERSION }} opus-src

      - name: configure
        working-directory: opus-src
        run: |
          ./configure \
            --host=${{ matrix.host_triple }} \
            --build=${{ matrix.build_triple }} \
            --enable-shared \
            --enable-static \
            --disable-doc \
            --disable-extra-programs \
            --enable-rtcd \
            CC=${{ matrix.cc }} \
            CFLAGS="${{ matrix.cflags }}" \
            ${{ matrix.extra_configure }}

      - name: assert intrinsics defined
        working-directory: opus-src
        run: |
          echo "=== Intrinsics in config.h ==="

          grep -E "(MAY_HAVE|PRESUME)_(AVX2|SSE4_1|SSE2|NEON|DOTPROD)" config.h \
            | grep "#define" \
            | grep -v "^//"

          # Fail if no intrinsic defines were set at all
          grep -qE "#define OPUS_(X86|ARM).*(MAY_HAVE|PRESUME)" config.h

      - name: make
        working-directory: opus-src
        run: make -j$(nproc)

      - name: verify AVX2 code generation (x64 only)
        if: matrix.rid == 'linux-x64'
        working-directory: opus-src
        run: |
          echo "=== YMM register usage (AVX2 evidence) ==="
          COUNT=$(objdump -d .libs/libopus.so.0 | grep -c "ymm" || true)

          echo "YMM instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No AVX2 instructions in .so"; exit 1; }

          echo "=== Verifying static archive also contains AVX2 ==="
          COUNT_A=$(objdump -d .libs/libopus.a | grep -c "ymm" || true)

          echo "YMM instructions in .a: $COUNT_A"
          [ "$COUNT_A" -gt 0 ] || { echo "ERROR: No AVX2 instructions in .a"; exit 1; }
          objdump -p .libs/libopus.so.0 | grep SONAME

      - name: verify NEON code generation (arm64 only)
        if: matrix.rid == 'linux-arm64'
        working-directory: opus-src
        run: |
          echo "=== NEON vector register usage ==="
          COUNT=$(aarch64-linux-gnu-objdump -d .libs/libopus.so.0 | grep -cE "\bv[0-9]+\.(16b|8h|4s|2d)\b" || true)

          echo "NEON vector instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No NEON instructions found"; exit 1; }

      - name: test (native only)
        if: matrix.rid == 'linux-x64'
        working-directory: opus-src
        run: make check

      - name: prepare artifact
        run: |
          mkdir -p dist/bin && mkdir -p dist/lib
          ls -la opus-src/.libs/

          cp opus-src/.libs/libopus.a dist/lib
          cp opus-src/.libs/libopus.so dist/bin

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-${{ matrix.rid }}
          path: dist
          retention-days: ${{ env.RETENTION_DAYS }}

  build-macos:
    name: build ${{ matrix.rid }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: osx-arm64
            runs_on: macos-26
            cflags: "-O2 -pipe"

          - rid: osx-x64
            runs_on: macos-26-large
            cflags: "-O2 -pipe"

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: download source
        run: |
          curl -fSL "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -o opus.tar.gz
          echo "${{ env.OPUS_CHECKSUM }}  opus.tar.gz" | shasum -a 256 --check
          tar -xzf opus.tar.gz
          mv opus-${{ env.OPUS_VERSION }} opus-src

      - name: configure
        working-directory: opus-src
        run: |
          ./configure \
            --enable-shared \
            --enable-static \
            --disable-doc \
            --disable-extra-programs \
            --enable-rtcd \
            CFLAGS="${{ matrix.cflags }} -mmacosx-version-min=${{ env.MACOS_MIN_TARGET }}" \
            LDFLAGS="-mmacosx-version-min=${{ env.MACOS_MIN_TARGET }}"

      - name: assert intrinsics defined
        working-directory: opus-src
        run: |
          echo "=== Intrinsics in config.h ==="

          grep -E "(MAY_HAVE|PRESUME)_(AVX2|SSE4_1|SSE2|NEON|DOTPROD)" config.h \
            | grep "#define" \
            | grep -v "^//"

          # Fail if no intrinsic defines were set at all
          grep -qE "#define OPUS_(X86|ARM).*(MAY_HAVE|PRESUME)" config.h

      - name: make
        working-directory: opus-src
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: verify AVX2 code generation (x64 only)
        if: matrix.rid == 'osx-x64'
        working-directory: opus-src
        run: |
          echo "=== AVX2 evidence (YMM registers) ==="
          COUNT=$(objdump -d .libs/libopus.dylib | grep -c "ymm" || true)

          echo "YMM instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No AVX2 instructions in dylib"; exit 1; }

      - name: verify NEON code generation (arm64 only)
        if: matrix.rid == 'osx-arm64'
        working-directory: opus-src
        run: |
          echo "=== NEON vector register usage ==="
          COUNT=$(objdump -d .libs/libopus.dylib | grep -cE "\bv[0-9]+\.(16b|8h|4s|2d)\b" || true)

          echo "NEON vector instructions found: $COUNT"
          [ "$COUNT" -gt 0 ] || { echo "ERROR: No NEON instructions found"; exit 1; }

      - name: prepare artifact
        run: |
          mkdir -p dist/bin && mkdir -p dist/lib
          ls -la opus-src/.libs/

          cp opus-src/.libs/libopus.dylib dist/bin
          cp opus-src/.libs/libopus.a dist/lib

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libopus-${{ matrix.rid }}
          path: dist
          retention-days: ${{ env.RETENTION_DAYS }}

